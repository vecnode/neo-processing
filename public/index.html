<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>neo-processing v0.1.0</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side-panel" id="side-panel" aria-hidden="true">
      <div class="side-panel-inner">
        <h2>Capture</h2>
        <div class="panel-controls">
          <button id="record-button" class="panel-button" type="button" aria-pressed="false">
            <span class="rec-dot" aria-hidden="true"></span>
            <span class="rec-label">Record</span>
          </button>
          <button id="capture-button" class="panel-button" type="button">Capture PNG</button>
          <button id="fullscreen-button" class="panel-button" type="button">Fullscreen</button>
        </div>
        <p class="panel-hint" id="capture-hint">Run a sketch, then record video or capture a frame. Files are saved to <code>outputs/</code>.</p>
      </div>
    </aside>

    <div class="main-layout">
      <header class="top-row">
        <nav class="menu-bar" aria-label="Application menu">
          <button id="run-button" class="menu-button run-button" type="button" aria-label="Run sketch">&gt;</button>
          <div class="menu-group">
            <button class="menu-button" type="button" aria-haspopup="true" aria-expanded="false" data-menu="file-menu">File</button>
            <ul class="menu-list" id="file-menu" role="menu" hidden>
              <li role="none"><button class="menu-item" type="button" role="menuitem" data-action="New file">New</button></li>
              <li role="none"><button class="menu-item" type="button" role="menuitem" data-action="Open file">Open</button></li>
              <li role="none"><button class="menu-item" type="button" role="menuitem" data-action="Save file">Save</button></li>
            </ul>
          </div>
        </nav>
        <button id="hamburger-button" class="hamburger-button" type="button" aria-controls="side-panel" aria-expanded="false" aria-label="Toggle sidebar">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </header>

      <main class="middle-row" id="middle-row">

        <section class="middle-panel left-panel" aria-label="Main workspace">
          <div id="ace-editor" class="code-editor"></div>
          <div class="editor-meta" id="editor-meta"></div>
        </section>

        <div class="splitter" id="splitter" role="separator" aria-orientation="vertical" aria-label="Resize panels" tabindex="0"></div>
        
        <section class="middle-panel right-panel" aria-label="Details panel">
          <!-- CODE RENDER WILL COME HERE -->
        </section>

      </main>

      <footer class="bottom-row">
        <span class="status-label">>_</span>
        <output id="terminal" aria-live="polite"></output>
      </footer>
    </div>
  </div>

  <script src="/libs/ace.js"></script>
  <script src="/libs/theme-textmate-css.js"></script>
  <script src="/libs/theme-textmate.js"></script>
  <script src="/libs/mode-javascript.js"></script>
  <script src="/script.js"></script>
</body>
</html>
